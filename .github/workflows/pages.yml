name: Deploy to GitHub Pages

on:
  push:
    branches:
      - claude/healthcare-design-system-skqg83
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Set repository variable PUBLIC_SITE=true in GitHub to publish the full site.
      # When unset or not "true", only the gate page is deployed — at every HTML route.
      - name: Prepare site artifact
        env:
          PUBLIC_SITE: ${{ vars.PUBLIC_SITE }}
          GITHUB_PAGES: 'true'
        run: bash scripts/prepare-site.sh

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
