<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Florida Day Hospital — Same-Day Surgical Care, Roodepoort</title>
  <meta name="description" content="Florida Day Hospital is a modern private day hospital in Florida Park, Roodepoort, providing streamlined same-day surgical care.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* ================================================================
       FLORIDA DAY HOSPITAL — DESIGN TOKENS
       Every component consumes these tokens. Nothing is hardcoded:
       no hex value or px duration may appear inside a component.
       ================================================================ */

    :root {
      /* surfaces */
      --bg:            #FBFCFD;
      --surface:       #FFFFFF;
      --surface-2:     #F1F6FA;   /* pale clinical blue tint */
      --ink-deep:      #0C1B28;   /* near-black navy — dark bands, footer */
      --ink-deep-2:    #12283A;   /* one step lighter, for gradients on dark */

      /* text */
      --text:          #17262F;
      --text-muted:    #5D7180;   /* verify: passes AA on --bg and --surface at 16px */
      --text-on-dark:  #F4F8FB;
      --text-on-dark-muted: rgba(244,248,251,0.72);

      /* brand */
      --accent:        #2C7CA8;   /* FDH blue, deepened for AA-safe interactive use */
      --accent-bright: #4FA3D1;   /* the logo's actual sky blue — large text, icons, borders only */
      --accent-contrast:#FFFFFF;
      --brand-red:     #D6303F;   /* QUARANTINED: logo mark + cross glyph ONLY. Never on a
                                      button, link, error state, or any interactive element.
                                      Red = urgency in medical contexts; C-10 bans urgency. */

      /* lines */
      --hairline:      #E4EBF1;
      --hairline-dark: rgba(255,255,255,0.12);

      /* type */
      --font-display:  'Fraunces', Georgia, serif;
      --font-body:     'Inter', -apple-system, sans-serif;
      --font-mono:     'IBM Plex Mono', ui-monospace, monospace;
      --scale-ratio:   1.3;
      --weight-body:   400;
      --weight-medium: 500;
      --weight-heavy:  600;      /* 600 is the ceiling. 700+ reads cheap in this system. */
      --tracking-tight:-0.015em; /* display headlines */
      --tracking-body: 0;
      --tracking-mono: 0.14em;   /* eyebrows */
      --line-height:   1.6;
      --line-height-display: 1.06;

      /* space — THE premium lever. Doubledish vs Material's default. */
      --space-unit:    1.75rem;
      --section-pad:   clamp(88px, 12vw, 152px);   /* vertical section padding */
      --container-max: 1160px;
      --container-pad: clamp(20px, 4vw, 40px);

      /* surface treatment */
      --radius:        6px;
      --radius-lg:     10px;
      --shadow-rest:   0 1px 2px rgba(12,27,40,0.05), 0 8px 24px rgba(12,27,40,0.06);
      --shadow-raise:  0 2px 4px rgba(12,27,40,0.06), 0 16px 40px rgba(12,27,40,0.10);
      /* NOTE: long-throw, low-opacity, navy-tinted (not black) shadows.
         This is the expensive-looking shadow. Never use rgba(0,0,0,…) directly. */

      /* motion — inherited by ALL animation, per registry rule */
      --motion-dur-fast: .2s;
      --motion-dur-slow: .45s;
      --motion-ease:     cubic-bezier(.4,0,.2,1);
    }

    /* ================================================================
       GLOBAL RESET & BASE
       ================================================================ */

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
    }

    img {
      max-width: 100%;
      display: block;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-body);
      font-weight: var(--weight-body);
      color: var(--text);
      background: var(--bg);
      line-height: var(--line-height);
      letter-spacing: var(--tracking-body);
      font-size: 17px;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* Universal focus style — C-10 a11y-gated build.
       Applied to EVERYTHING interactive. Never outline:none without replacement. */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
      border-radius: 2px;
    }

    /* prefers-reduced-motion global kill-switch */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: .001ms !important;
        transition-duration: .001ms !important;
      }
      html { scroll-behavior: auto; }
    }

    /* ================================================================
       TYPE SCALE — ratio 1.3 on a 17px base
       ================================================================ */

    .t-display {
      font-family: var(--font-display);
      font-weight: var(--weight-medium);
      font-size: clamp(40px, 5.4vw, 68px);
      line-height: var(--line-height-display);
      letter-spacing: var(--tracking-tight);
    }

    .t-h2 {
      font-family: var(--font-display);
      font-weight: var(--weight-medium);
      font-size: clamp(30px, 3.6vw, 44px);
      line-height: 1.12;
      letter-spacing: var(--tracking-tight);
    }

    .t-h3 {
      /* card titles are SANS, not serif */
      font-family: var(--font-body);
      font-weight: var(--weight-heavy);
      font-size: 21px;
      line-height: 1.3;
    }

    .t-body {
      font-size: 17px;
    }

    .t-small {
      font-size: 15px;
      color: var(--text-muted);
    }

    .t-eyebrow {
      font-family: var(--font-mono);
      font-size: 12.5px;
      text-transform: uppercase;
      letter-spacing: var(--tracking-mono);
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .t-eyebrow::before {
      content: '';
      width: 28px;
      height: 1px;
      background: var(--accent);
    }

    /* ================================================================
       LAYOUT PRIMITIVES
       ================================================================ */

    .wrap {
      max-width: var(--container-max);
      margin-inline: auto;
      padding-inline: var(--container-pad);
    }

    section {
      padding-block: var(--section-pad);
    }

    /* ================================================================
       BUTTONS — exactly two variants.
       Never --brand-red, never shadows, never gradients.
       ================================================================ */

    .btn-solid,
    .btn-ghost {
      display: inline-block;
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: var(--weight-heavy);
      line-height: 1;
      padding: 15px 30px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      cursor: pointer;
      text-decoration: none;
      transition: transform var(--motion-dur-fast) var(--motion-ease),
                  background var(--motion-dur-fast) var(--motion-ease);
    }

    .btn-solid {
      background: var(--accent);
      color: var(--accent-contrast);
    }

    .btn-solid:hover {
      background: #256B92;
      transform: translateY(-1px);
    }

    .btn-ghost {
      background: transparent;
      border-color: currentColor;
      color: var(--accent);
    }

    .on-dark .btn-ghost,
    .btn-ghost.on-dark {
      color: var(--text-on-dark);
    }

    .btn-ghost:hover {
      transform: translateY(-1px);
    }
  </style>
</head>
<body>

  <main>
  </main>

  <script>
  </script>
</body>
</html>
